<!DOCTYPE html>
<html>
<head>
 <title>Image Gallery Reference</title> 
<style>

  h2{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

  p{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

desc{
  ont-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

* {
  box-sizing: border-box;
}

div.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
}

div.gallery-item {
  margin: 5px;
  border: 1px solid #ccc;
  width: calc(25% - 20px);
}

div.gallery-item:hover {
  border: 1px solid #777;
}

div.gallery-item img {
  width: 100%;
  height: auto;
}

div.gallery-item div.desc {
  padding: 15px;
  text-align: center;
}

@media only screen and (max-width: 768px) {
  div.gallery-item {
    width: calc(50% - 20px);
  }
}

@media only screen and (max-width: 480px) {
  div.gallery-item {
    width: calc(100% - 20px);
  }
}
</style>
</head>
<body>

<h2 style="text-align: center;">Responsive Image Gallery</h2>

<div class="gallery">

<div class="gallery-item">
  <a target="_blank" href="night.png">
    <img src="night.png" alt="Night" width="400" height="300">
  </a>
  <div class="desc">Night</div>
</div>

<div class="gallery-item">
  <a target="_blank" href="ombre.png">
    <img src="ombre.png" alt="Ombre" width="400" height="300">
  </a>
  <div class="desc">Ombre</div>
</div>

<div class="gallery-item">
  <a target="_blank" href="grid.png">
    <img src="grid.png" alt="Grid" width="400" height="300">
  </a>
  <div class="desc">Grid</div>
</div>

<div class="gallery-item">
  <a target="_blank" href="dreamy.png">
    <img src="dreamy.png" alt="Mountains" width="400" height="300">
  </a>
  <div class="desc">Dreamy</div>
</div>

</div>

<p style="text-align: center;">Use this page as reference for the landing page plus clickable image links!</p>

</body>
</html>
