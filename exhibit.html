<!DOCTYPE html>
<html>
<head>
 <title>Image Gallery Reference</title> 
<style>

  h2{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

  p{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

}

* {
  box-sizing: border-box;
}

div.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
}

div.gallery-item {
  margin: 5px;
  border: 1px solid transparent;
  width: calc(25% - 20px);
}

div.gallery-item:hover {
  border: 1px solid black;
}

div.gallery-item img {
  width: 100%;
  height: auto;
}

div.gallery-item div.desc {
  padding: 15px;
  text-align: center;
}

@media only screen and (max-width: 768px) {
  div.gallery-item {
    width: calc(50% - 20px);
  }
}

@media only screen and (max-width: 480px) {
  div.gallery-item {
    width: calc(100% - 20px);
  }
}
</style>
</head>
<body>

<h2 style="text-align: center;">Responsive Image Gallery</h2>

<div class="gallery">

<div class="gallery-item">
  <a href="https://ririsakura.github.io/art-74/">
    <img src="night.png" alt="Night" width="600" height="400">
  </a>
  <div class="desc">Art-74</div>
</div>

<div class="gallery-item">
  <a href="https://ririsakura.github.io/art-109/">
    <img src="ombre.png" alt="Ombre" width="600" height="400">
  </a>
  <div class="desc">Art-109 (incomplete)</div>
</div>

<div class="gallery-item">
  <a href="https://ririsakura.github.io/about.html">
    <img src="grid.png" alt="Grid" width="600" height="400">
  </a>
  <div class="desc">About</div>
</div>

<div class="gallery-item">
  <a href="https://ririsakura.github.io/artwork.html">
    <img src="dreamy.png" alt="Mountains" width="400" height="400">
  </a>
  <div class="desc">Artwork</div>
</div>

</div>

<p style="text-align: center;">Use this page as reference for the landing page plus clickable image links!</p>

</body>
</html>
