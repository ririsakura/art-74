<!DOCTYPE html>
<html>
<head>
 <title>Image Gallery Reference</title>   
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>


h2{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

p{
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 17px;
}

div.scroll-container {
  background-color: transparent;
  overflow: auto;
  white-space: nowrap;
  padding: 10px;
}

div.scroll-container img {
  padding: 10px;
}

body {
    background-image: url(toast.png);
    background-color: transparent;
}

</style>
</head>
<body>

<h2 style="text-align: center;">Image Gallery With Horizontal Scroll</h2>
<p style="text-align: center;">Refer to this for portfolio project pages!</p>

<div class="scroll-container">
  <img src="dreamy.png" alt="Dreamy" width="500" height="500">
  <img src="clouds.png" alt="Clouds" width="500" height="500">
  <img src="fluffy.png" alt="Fluffy" width="500" height="500">
  <img src="peach.png" alt="Peach" width="500" height="500">
</div>


</body>
</html>
