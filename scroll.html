<!DOCTYPE html>
<html>
<head>
 <title>Image Gallery Reference</title>   
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

div.scroll-container {
  background-color: transparent;
  overflow: auto;
  font-family: 'Trebuchet MS';
  font-size: 17px;
  white-space: nowrap;
  padding: 10px;
}

div.scroll-container img {
  padding: 10px;
}



</style>
</head>
<body>

<h2 style="text-align: center;">Image Gallery With Horizontal Scroll</h2>
<p style="text-align: center;">Use the horizontal scrollbar to see the other images.</p>

<div class="scroll-container">
  <img src="dreamy.png" alt="Dreamy" width="600" height="400">
  <img src="clouds.png" alt="Clouds" width="600" height="400">
  <img src="fluffy.png" alt="Fluffy" width="600" height="400">
  <img src="peach.png" alt="Peach" width="600" height="400">
</div>


</body>
</html>
